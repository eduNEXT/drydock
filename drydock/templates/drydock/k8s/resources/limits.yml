---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-resources
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 32Gi
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: object-counts
spec:
  hard:
    pods: "30"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: cpu-resource-constraint
spec:
  limits:
  - default: # this section defines default limits
      cpu: 200m
    defaultRequest: # this section defines default requests
      cpu: 100m
    max: # max and min define the limit range
      cpu: "1"
    type: Container
---
apiVersion: v1
kind: LimitRange
metadata:
  name: memory-resource-constraint
spec:
  limits:
  - default: # this section defines default limits
      memory: 2Gi
    defaultRequest: # this section defines default requests
      memory: 50Mi
    max: # max and min define the limit range
      memory: 2Gi
    type: Container
---
kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: allow-intranamespace-traffic
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: openedx-{{ ID }}
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/instance: openedx-{{ ID }}
  egress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/instance: openedx-{{ ID }}
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: shipyard-harmony
